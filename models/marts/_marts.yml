version: 2

models:
  - name: fct_orders
    description: "One row per order: revenue, line count, delivery time, and status."
    columns:
      - name: order_id
        description: "Primary key — unique identifier for each order."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customers."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        description: "Order lifecycle status."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Complete', 'Shipped', 'Processing', 'Cancelled', 'Returned']

  - name: dim_customers
    description: "One row per customer, with demographic and geographic attributes."
    columns:
      - name: customer_id
        description: "Primary key — unique identifier for each customer."
        data_tests:
          - unique
          - not_null

  - name: dim_products
    description: "One row per product, with category, brand, and price attributes."
    columns:
      - name: product_id
        description: "Primary key — unique identifier for each product."
        data_tests:
          - unique
          - not_null
      
  - name: dim_customers_scd
    description: >
      SCD Type 2 customer dimension. Each row represents one version of a customer.
      A customer who has changed city, state, country, or traffic_source will have
      multiple rows — one per change — with validity windows and an is_current flag.
    columns:
      - name: customer_key
        description: Surrogate key — unique per customer version (hash of customer_id + valid_from)
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key — the customer's original ID, constant across all versions
        tests:
          - not_null
      - name: is_current
        description: True for the customer's current record only
        tests:
          - not_null